<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Pro - 24K Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        /* ពណ៌មាសបែបលោហធាតុ (Metallic Gold Effect) */
        .gold-shimmer {
            background: linear-gradient(
                to right, 
                #bf953f 0%, 
                #fcf6ba 25%, 
                #b38728 50%, 
                #fbf5b7 75%, 
                #aa771c 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .gold-card {
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #b38728;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(179, 135, 40, 0.2);
            position: relative;
        }

        .btn-gold-solid {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 100%);
            color: #2a1f07;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .btn-gold-solid:active { transform: scale(0.96); }

        input {
            background: #000 !important;
            border: 1px solid #5d4a1f !important;
            color: #fcf6ba !important;
            outline: none;
        }

        input:focus {
            border-color: #fcf6ba !important;
            box-shadow: 0 0 15px rgba(179, 135, 40, 0.3);
        }

        .label-gold {
            color: #aa771c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="gold-card w-full max-w-sm p-8 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black gold-shimmer tracking-tighter uppercase">ហាងឆេងមាស</h1>
            <p class="label-gold text-[10px] mt-1 font-bold italic">Real-time 24K Gold Tracker</p>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-3">
                <label class="label-gold text-[10px] font-bold">Spot Price (USD/OZ)</label>
                <button onclick="getLivePrice()" id="fetchBtn" class="btn-gold-solid px-4 py-2 rounded-lg text-[10px] uppercase tracking-wider">
                    <span id="btnText">ទាញតម្លៃផ្ទាល់</span>
                </button>
            </div>
            <input type="number" id="ouncePrice" 
                class="w-full py-4 text-4xl rounded-xl text-center font-bold" 
                placeholder="0.00"
                oninput="calculateFromInput()">
        </div>

        <div class="space-y-4">
            <div class="p-6 bg-[#0a0a0a] rounded-2xl border border-[#332a16] text-center">
                <span class="label-gold text-[10px] block mb-2 font-bold italic">តម្លៃ ១ តម្លឹង (USD)</span>
                <div class="text-4xl font-black gold-shimmer">
                    $<span id="taelPrice">0.00</span>
                </div>
            </div>

            <div class="p-6 bg-gradient-to-br from-[#1a1a1a] to-black rounded-2xl border border-[#b38728]/30 text-center">
                <span class="label-gold text-[10px] block mb-2 font-bold italic">តម្លៃ ១ តម្លឹង (រៀល)</span>
                <div class="text-3xl font-bold text-[#fcf6ba]">
                    <span id="taelPriceRiel">0</span> <span class="text-sm font-light">៛</span>
                </div>
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-[#332a16] flex justify-between items-end text-[9px] font-bold text-[#5d4a1f]">
            <div>
                1 អោន = 31.1035G<br>
                1 តម្លឹង = 37.5G<br>
                1 តម្លឹង ≈ 1.205 អោន
            </div>
            <div class="text-right">
                <span id="lastUpdate" class="uppercase block leading-tight">រង់ចាំទិន្នន័យ...</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "goldapi-1qbw919mn41xylv-io"; 
        const RIEL_RATE = 4000; 

        async function getLivePrice() {
            const btnText = document.getElementById('btnText');
            const input = document.getElementById('ouncePrice');
            btnText.innerText = "កំពុងទាញ...";

            try {
                const response = await fetch('https://www.goldapi.io/api/XAU/USD', {
                    headers: { "x-access-token": API_KEY }
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                const currentPrice = data.price;

                input.value = currentPrice.toFixed(2);
                updateDisplay(currentPrice);

                // បង្ហាញ ថ្ងៃខែឆ្នាំ និង ម៉ោងនាទី
                const now = new Date();
                const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
                const dateStr = now.toLocaleDateString('km-KH', options);
                const timeStr = now.toLocaleTimeString('km-KH', { hour: '2-digit', minute: '2-digit', hour12: false });

                document.getElementById('lastUpdate').innerHTML = `កាលបរិច្ឆេទ: ${dateStr}<br>ម៉ោង: ${timeStr}`;
                
                btnText.innerText = "ជោគជ័យ";
                setTimeout(() => btnText.innerText = "ទាញតម្លៃផ្ទាល់", 2000);

            } catch (error) {
                console.error(error);
                alert("មិនអាចទាញតម្លៃបានទេ!");
                btnText.innerText = "បរាជ័យ";
            }
        }

        function calculateFromInput() {
            const val = document.getElementById('ouncePrice').value;
            if(val) updateDisplay(parseFloat(val));
            else {
                document.getElementById('taelPrice').innerText = "0.00";
                document.getElementById('taelPriceRiel').innerText = "0";
            }
        }

        function updateDisplay(price) {
            const resultUSD = (price / 31.1035) * 37.5;
            const resultRiel = resultUSD * RIEL_RATE;

            document.getElementById('taelPrice').innerText = resultUSD.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            const formattedRiel = (Math.round(resultRiel / 100) * 100).toLocaleString();
            document.getElementById('taelPriceRiel').innerText = formattedRiel;
        }
    </script>
</body>
</html>
