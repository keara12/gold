<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: radial-gradient(circle at top right, #1e3a8a, #111827);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gold-text {
            background: linear-gradient(to bottom right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fbbf24 !important;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #fbbf24 !important;
            background: rgba(255, 255, 255, 0.1) !important;
            transform: scale(1.02);
        }
        .fetch-btn {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            transition: all 0.2s;
        }
        .fetch-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="glass-card w-full max-w-sm p-8 mx-4 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-500/10 blur-3xl rounded-full"></div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold gold-text">ហាងឆេងមាសប្រចាំថ្ងៃ</h1>
            <p class="text-gray-400 text-xs mt-1 tracking-widest uppercase">Global Market Tracker</p>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-end mb-3">
                <label class="text-gray-400 text-xs font-light ml-1">តម្លៃក្នុង ១ អោន (USD)</label>
                <button onclick="getLivePrice()" id="fetchBtn" class="fetch-btn px-3 py-1.5 rounded-full text-[10px] text-yellow-500 font-bold flex items-center">
                    <span id="btnIcon" class="mr-1">⚡</span> <span id="btnText">ទាញតម្លៃផ្ទាល់</span>
                </button>
            </div>
            <input type="number" id="ouncePrice" 
                class="w-full py-5 text-3xl rounded-3xl text-center font-bold" 
                placeholder="0.00"
                oninput="calculateFromInput()">
        </div>

        <div class="space-y-3">
            <div class="p-4 bg-white/5 rounded-3xl border border-white/5 text-center transition-all">
                <span class="text-gray-400 text-xs block mb-1 font-medium">តម្លៃមាសក្នុង ១ តម្លឹង (USD)</span>
                <div class="text-3xl font-extrabold gold-text">
                    $<span id="taelPrice">0.00</span>
                </div>
            </div>

            <div class="p-4 bg-yellow-500/5 rounded-3xl border border-yellow-500/10 text-center transition-all">
                <span class="text-gray-400 text-xs block mb-1 font-medium">តម្លៃមាសក្នុង ១ តម្លឹង (រៀល)</span>
                <div class="text-2xl font-bold text-yellow-500">
                    <span id="taelPriceRiel">0</span> ៛
                </div>
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-white/5 flex justify-between text-[10px] text-gray-500">
            <div class="flex flex-col">
                <span>1 Oz = 31.1035g</span>
                <span>1 Tael = 37.5g</span>
            </div>
            <div class="text-right">
                <span id="lastUpdate">Update: រង់ចាំទិន្នន័យ...</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "goldapi-1qbw919mn41xylv-io"; 
        const RIEL_RATE = 4000; // អត្រាប្តូរប្រាក់ (អាចកែប្រែបាន)

        async function getLivePrice() {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const input = document.getElementById('ouncePrice');
            
            btnText.innerText = "កំពុងទាញ...";
            btnIcon.classList.add('animate-spin');

            try {
                const response = await fetch('https://www.goldapi.io/api/XAU/USD', {
                    headers: { "x-access-token": API_KEY }
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                const currentPrice = data.price;

                input.value = currentPrice.toFixed(2);
                updateDisplay(currentPrice);

                const now = new Date();
                document.getElementById('lastUpdate').innerText = "Update: " + now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
                
                btnText.innerText = "ទាញរួចរាល់";
                setTimeout(() => btnText.innerText = "ទាញតម្លៃផ្ទាល់", 2000);

            } catch (error) {
                console.error(error);
                alert("មិនអាចទាញតម្លៃបានទេ!");
                btnText.innerText = "បរាជ័យ";
            } finally {
                btnIcon.classList.remove('animate-spin');
            }
        }

        function calculateFromInput() {
            const val = document.getElementById('ouncePrice').value;
            if(val) updateDisplay(parseFloat(val));
            else {
                document.getElementById('taelPrice').innerText = "0.00";
                document.getElementById('taelPriceRiel').innerText = "0";
            }
        }

        function updateDisplay(price) {
            // គណនាជា ដុល្លារ/តម្លឹង
            const resultUSD = (price / 31.1035) * 37.5;
            
            // គណនាជា រៀល/តម្លឹង
            const resultRiel = resultUSD * RIEL_RATE;

            // បង្ហាញតម្លៃដុល្លារ
            document.getElementById('taelPrice').innerText = resultUSD.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // បង្ហាញតម្លៃរៀល (មូលត្រឹមខ្ទង់រយ)
            document.getElementById('taelPriceRiel').innerText = Math.round(resultRiel / 100) * 100;
            document.getElementById('taelPriceRiel').innerText = (Math.round(resultRiel / 100) * 100).toLocaleString();
        }
    </script>
</body>
</html>
